<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>jsPsychTimelineStopSignal Example</title>
  <script src="https://unpkg.com/jspsych"></script>
  <script src="../dist/index.global.js"></script>
  <!-- Load the published timeline package here, e.g.
<script src="https://unpkg.com/stop-signal"></script>
<script src="../dist/index.global.js"></script> -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css">
</head>

<body></body>
<script>
  const jsPsych = initJsPsych({
      on_finish: function() {
        jsPsych.data.displayData();
      }
    });

  const task = jsPsychTimelineStopSignal.createTimeline(jsPsych, {buttons : ["L", "R"], stop_percent: 0.5, image_width: 150, trial_duration: 1300, total_trials: 6, current_delay: 700, delay_change: 200});
  jsPsych.run([task])
</script>

</html>
