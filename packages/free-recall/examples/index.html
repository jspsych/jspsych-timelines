<!DOCTYPE html>
<html>
  <head>
    <title>Free Recall Task</title>
    <script src="https://unpkg.com/jspsych@8"></script>
    <script src="../dist/index.browser.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@8/css/jspsych.css" />
  </head>
  <body></body>
  <script>
    const jsPsych = initJsPsych({
      on_finish: function () {
        const data = jsPsych.data.get();
        const scores = jsPsychTimelineFreeRecall.utils.scoring.getSummary(data);
        console.log("Free Recall scores:", scores);
        jsPsych.data.displayData();
      },
    });

    const timeline = jsPsychTimelineFreeRecall.createTimeline(jsPsych, {
      showInstructions: true,
    });

    jsPsych.run([timeline]);
  </script>
</html>
