<!DOCTYPE html>
<html>
  <head>
    <title>Simple RT Task Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/jspsych@8"></script>
    <script src="../dist/index.browser.js"></script>
    <!-- Once published: <script src="https://unpkg.com/@jspsych-timelines/simple-rt"></script> -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/jspsych@8/css/jspsych.css" />
  </head>

  <body></body>
  <script>
    const jsPsych = initJsPsych({
      on_finish: () => {
        // Display data
        jsPsych.data.displayData();

        // Calculate and display scores
        const scores = jsPsychTimelineSimpleRT.utils.scoring.getSummary(jsPsych.data.get());
        console.log("Simple RT Task Results:", scores);
      },
    });

    // Create the simple RT task with default settings
    // For a shorter demo, reduce trial counts:
    const task = jsPsychTimelineSimpleRT.createTimeline(jsPsych, {
      numPracticeTrials: 3,
      numTrials: 10,
    });

    jsPsych.run([task]);
  </script>
</html>
