<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Performance Test</title>
    <script src="https://unpkg.com/jspsych@8"></script>
    <script src="../dist/index.browser.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@8/css/jspsych.css" />
  </head>
  <body></body>
  <script>
    const jsPsych = initJsPsych({
      on_finish: function () {
        const data = jsPsych.data.get();
        const scores = jsPsychTimelineCPT.utils.scoring.getSummary(data);
        console.log("CPT scores:", scores);
        jsPsych.data.displayData();
      },
    });

    const timeline = jsPsychTimelineCPT.createTimeline(jsPsych, {
      mode: "standard",
      showInstructions: true,
      showPractice: true,
      numTrials: 20, // Reduced for demo
    });

    jsPsych.run([timeline]);
  </script>
</html>
